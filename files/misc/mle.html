This workshop introduces **maximum likelihood estimation** and illustrates
many of the concepts and key ideas using &lt;img src="img/Rlogo.png" width="64"&gt;

* What is MLE?


* Bit of calculus...with pictures 😎  (sorry, this will be next time)
  + How do we find a *maximum*?

* Brute force

---
# Regression: model (sorta)

Let's start with a familiar story...
  
* Dependent variable (y) is associated with independent variables (x's).  For
one observation in our data set, we have

$$
y_i \,=\, \beta_1 X_1 \,+\, \beta_2 X_2 \,+\, \cdots \,+\,
          \beta_p X_p \,+\, \varepsilon_i
$$


* We observe `\(y\)` and the `\(x\)`'s
  (❤️❤️❤️
  our beloved data
  ❤️❤️❤️)
  + the `\(i\)` subscript just means a generic observation in our data,&lt;br&gt;
  so `\(i\)` can go from 1 to N (# number of observations)


* The **parameters** in our model are the `\(\beta\)`'s
  + wait, is `\(\varepsilon_i\)` a parameter?


---
# Regression: goals

This model can teach us a thing or two.

* But first we gotta put in a little work to find values for the `\(\beta\)`'s that
make good predictions for our data
  + nice! our model is wrong, but at least it will try to look like the real
  world (😘 data)


* Are the `\(\beta\)`'s different from 0? 🤩 Is this a
"good" model, or at least not as bad as my other model?


* To make some progress we need to make an assumption about how our
data are distributed.
  + actually, it might be better to think about our are *errors* are distributed  
  
---
# Regression: choosing the `\(\beta\)`'s

* The universe is pretty fond of the normal distribution, so let's start
there.
  + the universe also makes it hard to draw pictures in more than 2 dimensions,
so let's focus on a simple model for now

$$
y_i \,=\, \alpha + \beta X \,+\, \varepsilon_i
$$

* We assume that `\(\varepsilon_i \sim \mbox{Normal}(\mu = 0, \sigma = 1.8)\)` 

  + the `\(\sim\)` just means that the errors have a normal distribution
  + `\(\mu\)` is the mean of the normal distribution, and `\(\sigma\)` is the standard
  deviation

# Regression: behind the curtain

Formula for the normal distribution:


`$$f(y | X, \mu, \sigma^2) \;\;=\;\; \frac{1}{\sqrt{2\pi\sigma^2}}
\exp \left\{ \frac{-(y - \mu)^2}{2\sigma^2} \right\}$$`



``` r
norm_pdf &lt;- function(x, mu, sigma2) {
* y &lt;- (1/sqrt(2*pi*sigma2)) * exp( -((x - mu)^2) / (2*sigma2) )
  return(y)
}
norm_pdf(x = 0.4, mu = 0, sigma2 = 1.8^2)
```

```
## [1] 0.2162291
```

``` r
dnorm( x = 0.4, mean = 0, sd = 1.8 )
```

```
## [1] 0.2162291
```

# Density &amp;#8680; Likelihood

Yeah, yeah, but I'm here to learn about **MLE**!

* OK, so remember the density function for the normal distribution? This
was in our `norm_pdf()` function and looks like  


`$$f(y | X, \mu, \sigma^2) \;\;=\;\; \frac{1}{\sqrt{2\pi\sigma^2}}
\exp\left\{\frac{-(y - \mu)^2}{2\sigma^2}\right\}$$`

* This is our *density* function
  + with regression, `\(\mu = \alpha + \beta * X\)`


* Quick note: density is NOT the same as probability
  + they are related (just ask if you want the details)


---
# Density &amp;#8680; Likelihood

* With **maximum likelihood**, we flip what is known and what is given.
  + how likely is a value of the parameter, *given* the observed data
  + instead of `\(f(y | \beta, X)\)`, we use `\(f(\beta | y, X)\)`

  
* After the swap, we search for values of `\(\alpha\)`, `\(\beta\)`, and `\(\sigma\)` that
  give us the largest **likelihood**, `\(\mathcal{L}\)`

`\begin{eqnarray}
\mathcal{L}(\alpha, \beta, \sigma \,|\, y, X) &amp;=&amp; 
\frac{1}{\sqrt{2\pi\sigma^2}}
\exp \left\{ \frac{-(y - (\alpha + \beta*X))^2}{2\sigma^2} \right\}
\end{eqnarray}`

(recall that `\(\mu = \alpha + \beta * X)\)`


---
# Likelihood function


``` r
like1 &lt;- function(alpha, beta, sigma2, x, y) {
  mu &lt;- alpha + beta * x
  dens &lt;- (1/sqrt(2*pi*sigma2)) * exp( -((x - mu)^2) / (2*sigma2) )
  return(dens)
}
like1(alpha = 1, beta = 1, sigma = 1, x = 10, y = 8)
```

```
## [1] 0.2419707
```

``` r
like1(alpha = .5, beta = .5, sigma = .5, x = 10, y = 8)
```

```
## [1] 9.056529e-10
```

Aha!  Our first guess is better than our second guess.  &lt;br&gt;&lt;br&gt;

But what complications do we still have to conquer?


---
# Obstacles

* *First*, we've got more than 1 observation, so we need to set up our
likelihood function to include all 58 pairs of (x, y).

  + (as we'll see this leads to another math and computer issue)

* *Second*, it might take a LONG time to just randomly choose values for
the parameters and see if it increases the likelihood.

  + we need an efficient way to find the maximum of this function
  
  + the set of parameters that accomplish this are the &lt;br&gt;
  **maximum likelihood estimates**


---
# Multiple observations

* To get over the first hurdle, we need to throw another assumption on the
existing pile.


* If we assume our observations are *independent* and *identically* distributed
(i.e., they all have the same distribution), then we are back in the game!
  + sometimes you will see this as the *iid* assumption


* When two observations are independent, then the probability of
both occurring is just the probabilities multiplied together
  + Pr(Heads on 2 coin flips) = &lt;br&gt;
  Pr(first flip = Heads) * Pr(2nd flip = Heads)


---
class: slide-font-28
# Multiple observations (cont.)

With the *iid* assumption, our likelihood function is now...

`\begin{eqnarray}
\mathcal{L}(\alpha, \beta, \sigma \,|\, \boldsymbol{y}, \boldsymbol{X}) &amp;=&amp;
\mbox{Normal}(y_1, x_1, \alpha, \beta, \sigma) * \\
&amp;&amp; \mbox{Normal}(y_2, x_2, \alpha, \beta, \sigma) *  \\
&amp;&amp; \;\;\;\;\;\;\;\;\;\;\;\;\;\;\; \vdots  \\
&amp;&amp; \mbox{Normal}(y_{58}, x_{58}, \alpha, \beta, \sigma) \\ \\ 
\mbox{which we can abreviate as} \\ \\
\mathcal{L}(\alpha, \beta, \sigma \,|\, \boldsymbol{y}, \boldsymbol{X}) &amp;=&amp; \prod\limits_{i=1}^N \mbox{Normal}\,(\, \alpha, \beta, \,\sigma \;|\; X_i \,,\, y_i \,)
\end{eqnarray}`

*notation*: I'm using bold to indicate a vector:
`\(\boldsymbol{y} = (y_1, y_2, \ldots, y_{58})\)`


---
# Log likelihood

* If you try this out with more than a few observations, you will quickly discover
that likelihood gets really small really fast!
  + our computer will not be able to keep track of such small numbers


* We deal with this issue by working with the `\(\log()\)` of the likelihood
  + this has the added benefit of making the math easier
  + `\(\log(A * B) \;=\; \log(A) + \log(B)\)`
  
  
* So the log likelihood of N observations is simply

`\begin{eqnarray}
\log\{\mathcal{L}(\alpha, \beta, \sigma \,|\, \boldsymbol{y}, \boldsymbol{X}) \} &amp;=&amp;
\sum\limits_{i=1}^N \log\{\mbox{Normal}\,(\, \alpha, \beta, \,\sigma \;|\; X_i \,,\, y_i \,)\}
\end{eqnarray}`

# Maximization

Now let's get over our second hurdle...

* Maximize the log likelihood function

  + `\(\ell(\alpha, \beta, \sigma \,|\, \boldsymbol{y}, \boldsymbol{X}) \;\;=\;\; \log\{\mathcal{L}(\alpha, \beta, \sigma \,|\, \boldsymbol{y}, \boldsymbol{X})\)`

* The `optim()` function is the trick here. The arguments are

  + `par` -- a vector of initial values of the parameters that you want to find
  the "best" values
  
  + `fn` -- the function whose maximum you want to find
  
  + this tool actually *minimizes* the function, so your function should
  return the negative log likelihood
  
  
---
# Maximization (cont.)


``` r
max_like_est &lt;- optim(par = c(1, 1, 1), nlog_lik, x=x, y=y)
max_like_est$par  # MLE
```

```
## [1] 3.2139735 0.7168371 1.7344635
```

``` r
max_like_est$value # negative log likelihood at MLE
```

```
## [1] 167.4335
```

# Standard errors

``` r
mle2 &lt;- optim(par = c(1, 1, 1), nlog_lik, x=x, y=y,
*             hessian = TRUE)
mle2$par
```

```
## [1] 3.2139735 0.7168371 1.7344635
```

``` r
sqrt(diag(solve(mle2$hessian)))
```

```
## [1] 0.20078444 0.01909337 0.13299322
```

``` r
coef(summary(mod1))
```

```

```
