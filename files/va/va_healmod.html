---
# Implications &amp; Solutions

--

* Knowledge of the leading causes of death at the community/population level
informs health polices and facilitates the evaluation of interventions.

--
  
  + It can take many years for civil registration and vital statistics systems
  to develop sufficient capacity.

--

* **Verbal Autopsy** -- interviewing the decedent's next of kin or caregiver
to gather data on the relevant symptoms and medical history.

--

  + Physicians can assign causes of death using the VA data.

--

  + Algorithms have also been developed to assign causes, providing
  an expedient solution for providing CoD information.

# InSilicoVA

* InterVA -- popular VA algorithm that has been in service for 20+ years

--

* **InSilicoVA** [(McCormick, Li, Clark, et al., 2016)](https://www.tandfonline.com/doi/full/10.1080/01621459.2016.1152191)
-- developed to improve upon InterVA...
  
--

  + fully probabilistic model with a hierarchical structure that estimates
  
      - distribution of deaths by cause in the population (CSMF)
      
      - *probability of each cause* for individuals
      &lt;/br&gt;(InterVA &amp;rarr; "indeterminate")
      
--

  + provides uncertainty estimates at both the population and individual level

--

  + accounts for missing values in the data


---
# Validation Studies &amp; Reports

[Natl. Cause of Death Validation Study (S. Africa)](https://www.tandfonline.com/doi/full/10.1080/16549716.2023.2285105)

* Can VA algorithms reproduce physician cause assignment?

--

* Individual Level: Agree on Top Cause (Top 3)

  + InSilicoVA -- 51.6% (73.8%)
  + InterVA5 -- 48.2% (70.9%)
  + Tariff2 -- 51.2% (*not available*)
  
--

* Population level: CSMF Accuracy

  + InSilicoVA -- 0.84
  + InterVA5 -- 0.81
  + Tariff2 -- 0.82

---
background-image: url("img/mrc_results.png")
background-size: contain



---
# Validation Studies &amp; Reports

[Tanzanian MoH Report's Key Findings]()

* VA methodology works well; recommend scaling up to national level

* "The best performing CCVA algorithm was InSilicoVA with a CSMF
physician concordance of 83%.  InSilicoVA also has an advantage over
InterVA5 and Tariff2 in that it does not deliver undetermined results."
(p. 50)



---
# Moving Forward

There are various ways of improving VA cause assignment using computer coded
algorithms

* Improving algorithm performance

  + symptom dependence
  + domain adaptation models

* Use more information from the VA interview

* Growing the body of VA data with reference causes to train algorithms/models

  + build knowledge on epidemiological differences across space &amp; time
