class: slide-font-25
# Bayesics

This process of flipping the Martian coin illustrates the Bayesian framework

* stating your original belief about the chance of heads (H)

  + .red[*prior* distribution for the probability of H, Pr(H)]
  
* gathering some data (e.g., coin tosses) &amp; choosing a model

  + .red[*likelihood*] (what frequentists primarily rely on)
  + .red[conditional prob of data given parameters]
  + .red[for a given probability of H, how likely are these data: HTTTTTTTTT]
  
* **updating** your belief after seeing the data (what do you expect to
happen on the next experiment/observation?)

  + .red[*posterior* distribution (used for inference)]
  
* (and repeat) -- use updated beliefs for the next data set


---
# Slightly more formally

* *Prior distribution:* Pr(Heads)

* *Likelihood:* Pr(Data | Heads)
  
* *Posterior* (using Bayes' Theroem)

$$
\mbox{Pr(Heads|Data)} = \frac{\mbox{Pr(Data | Heads) Pr(Heads)}}{\mbox{Pr(Data)}}
$$
Since Pr(Data) (in the denominator) does not involve Pr(Heads), it is
just a scaling constant that can be ignored, so we typically work with

$$
\mbox{Pr(Heads|Data)} \propto \mbox{Pr(Data | Heads) Pr(Heads)}
$$

(posterior is proportional to likelihood * prior)


---
# Bayes' Theorem

Quick detour on probabilities

* `\(Pr(A)\)`: marginal probability of event *A* (possible events: {*A*, *B*})

  + example:
  &amp;nbsp;&amp;nbsp;
  `\(Pr (Heads) = \frac{1}{2} \;\;\;\;, \;\;\;\;Pr [Tails] = \frac{1}{2}\)`
  
* `\(Pr( D | E )\)`: conditional prob of event *D* given that event *E* occurred

  + example:
    &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;
    `\(Pr(\)` 2nd card = ♠️ &amp;nbsp;|&amp;nbsp; 1st card = ♦️)
  

  conditional probability of drawing a spade from a deck of cards given that 
you pulled a diamond on your first draw


---
# Bayes' Theorem

Quick detour on probabilities

* `\(Pr(D, E)\)`: joint prob of both events `\(D\)` and `\(E\)` occurring

  + example:
  &amp;nbsp;&amp;nbsp;&amp;nbsp;&amp;nbsp;
  `\(Pr(\)` 🎲 &amp;nbsp;=&amp;nbsp; 4 &amp;nbsp;&amp;nbsp;,&amp;nbsp;&amp;nbsp; 🎲 &amp;nbsp;&gt;&amp;nbsp; 4)


* Relationships among probabilities:
  
  + `\(Pr(A, B) \;=\; Pr(A | B) * Pr(B)\)`  &amp;nbsp;&amp;nbsp; &amp;rArr; &amp;nbsp;&amp;nbsp;
  `\(\frac{Pr(A,B)}{Pr(B)} \;=\; Pr(A | B)\)`
  
  + Bayes' Theorem:
  
  $$ \frac{Pr(B | A) Pr(A)}{Pr(B)} \;=\; \frac{Pr(A, B)}{Pr(B)} \;=\; Pr(A | B) $$

# Toy example

* Let's tackle this Martian coin with a few examples, starting
with a silly version with hope that it gives us some insight.

* Set up
  + Data: TTTT
  + Model: *binomial* distribution (for 0/1 or yes/no outcomes)
  + What is `\(\pi\)` (probability of H)?

* A few details about this model for 0/1 outcomes.
  + the model is not interested in the order, so HTH is the same as HHT
  + but we need to *count* the number of ways we can get one T and
  two H (to figure out how likely this outcome is)


---
# Binomial distribution

* The binomial has one parameter, we will call it `\(\pi\)`, and some data
  + `\(n\)` - number of coin flips (trails)
  + `\(x\)` - number of heads/H (successes)
  + `\(\pi\)` = Pr(H)

* Formula for the binomial distribution (probability of getting `\(x\)` heads/H
when you flip the coin `\(n\)` times) is

`$$Pr(x) = {n \choose x} \pi^x (1 - \pi)^{n - x}$$`

---
class: slide-font-25
# Side note: combinatorics

* `\({n \choose x}\)`  &amp;mdash; "n choose x" shows up in the binomial distribution
and helps us count 

  + In `\(n\)` coin flips, how many ways can we get `\(x\)` number of heads?
  
  + `\({n \choose x} \;\;=\;\; \frac{n!}{(n-x)! x!}\)`
  
  + example 

`$${10 \choose 10} \;\;=\;\; \frac{10!}{(10-10)! 10!} \;\;=\;\; \frac{10!}{(1) 10!} \;\;=\;\; 1$$`
The is only 1 way to get 10 H from 10 coin flips:

  + the `\(1^{st}\)` flip = H, the `\(2^{nd}\)` flip = H, ..., AND the `\(10^{th}\)` flip = H.


---
# Side note: more combinatorics

With 10 flips, how many ways can we get only one H?

--


``` r
&gt; choose(10, 1)
```

```
## [1] 10
```

--

10 ways to get only 1 H
  + only the first flip = H, all other 9 = T
  + only the second flip = H
  + ...
  + only the tenth flip = H

# Simple Bayesian example

Let's model that Martian penny.

* What is your prior belief before seeing the Martian penny in action?

--

  + I bet it acts like an Earth penny, since we are standing in Columbus. So
  `\(Pr(\mbox{Heads})\)` is about `\(\frac{1}{2}\)` with very little wiggle room.

--

    - strong prior belief

--

  + No idea!  Any value between 0 and 1 is equally likely.

--
  
    - flat/diffuse/uninformative prior belief or uninformative

--
    
  + 0.5 is more likely than other values, but the Martians may have altered
  the coin so not too sure

--

    - weakly informative prior


---
# Introducing the Beta dist

Since the probability of heads is bounded between 0 &amp; 1, a Beta distribution
is a popular choice for a prior distribution.

--

* The Beta dist. has two parameters: `\(\alpha &gt; 0\)` , and `\(\beta &gt; 0\)`

--

* The mean of the Beta is `\(\frac{\alpha}{\alpha + \beta}\)`

--

* In R, we can use `dbeta()` to explore the Beta dist. and `rbeta()` to make
random draws from a Beta

--

  + `dbeta(x, shape1, shape2)`
  
  + `\(\alpha\)` is shape1
  
  + `\(\beta\)` is shape2


---
# Pick your prior


``` r
&gt; p &lt;- seq(0, 1, by = 0.001)
&gt; plot(p, dbeta(p, shape1 = 1, shape2 = 1), type = "l", lwd = 3, ylim = c(0, 4), main = "Prior for Pr(H)",
+     ylab = "density")
&gt; points(p, dbeta(p, shape1 = 2, shape2 = 1), col = "blue", type = "l")
&gt; points(p, dbeta(p, shape1 = 1, shape2 = 2), col = "red", type = "l")
&gt; points(p, dbeta(p, shape1 = 8, shape2 = 8), col = "darkgreen", type = "l")
&gt; points(p, dbeta(p, shape1 = 0.2, shape2 = 0.2), col = "bisque4", type = "l")
&gt; text(0.15, 4, labels = expression(paste(alpha, " = 1, ", beta, " = 1")))
&gt; text(0.15, 3.7, labels = expression(paste(alpha, " = 2, ", beta, " = 1")), col = "blue")
&gt; text(0.15, 3.4, labels = expression(paste(alpha, " = 1, ", beta, " = 2")), col = "red")
&gt; text(0.75, 4, labels = expression(paste(alpha, " = 8, ", beta, " = 8")), col = "darkgreen")
&gt; text(0.75, 3.7, labels = expression(paste(alpha, " = 0.2, ", beta, " = 0.2")), col = "bisque4")
```

# Update our penny prior

How to get prob of data?

* A Martian coin flip gives us Heads or Tails, and n flips can be modeled
with the binomial distribution

--

* To get the posterior distribution for the probability of heads, we use
Bayes' Theorem for `\(\theta = Pr(H)\)`

$$ Pr(\theta | data) \;\;=\;\;\frac{Pr(\mbox{data} | \theta) \;\;Pr(\theta)}{Pr(data)}$$

`$$\;\;=\;\;\frac{\mbox{Binomial}(\mbox{data} \;|\; p = \theta) \;\;\mbox{Beta}(\theta \;|\; \alpha, \beta)}{Pr(\mbox{data})}$$`
`$$\;\;\propto\;\;\mbox{Binomial}(\mbox{data} \;|\; p = \theta) \;\;\mbox{Beta}(\theta \;|\; \alpha, \beta)$$`

(posterior is proportional to likelihood * prior, since Pr(data) does not depend on `\(\theta\)`)


---
class: slide-font-25
# Side note: gamma function `\(\gamma ( x )\)`

(For the mathematically curious) when working with the beta and binomial
distributions we will come across

* `\(\gamma(x)\)` &amp;mdash; the gamma function appears in the beta distribution

  + `\(\gamma(x) = \int_0^{\infty} t^{x-1} \exp(-t) dt\)`
  
  + `\(\gamma(x) \;\;=\;\; (x-1)! \;\;=\;\; (x-1) * (x-2) * \cdots * 1\)`

  

``` r
&gt; gamma(4)  ## 3 * 2 * 1
```

```
## [1] 6
```

``` r
&gt; gamma(4) == factorial(3)
```

```
## [1] TRUE
```

class: slide-font-25
# Posterior penny

Posterior distribution for our parameter `\(\theta\)` is

`$$\;\;\propto\;\;
{n \choose x} \theta^{x} (1 - \theta)^{n - x} \;\;*\;\;
\frac{\gamma(\alpha + \beta)}{\gamma(\alpha)\gamma(\beta)} \theta^{\alpha - 1} (1 - \theta)^{\beta - 1}$$`

--

`$$\;\;=\;\;
C_1 \;*\; \color{red}{\theta^{x} (1 - \theta)^{n - x}}\;\;*\;\;
C_2 \;*\; \color{red}{\theta^{\alpha - 1} (1 - \theta)^{\beta - 1}}$$`

--


`$$\;\;=\;\; C_3 \;*\; \theta^{x + \alpha - 1} (1 - \theta)^{n - x + \beta - 1}$$`
--


This is a Beta `\((\theta \;|\; \alpha^* \; \beta^*)\)` 

* `\(\alpha^* = x + \alpha\)`
* `\(\beta^* = n - x + \beta\)`
* our prior is like a previous data set with `\((\alpha - 1)\)` heads
and `\((\beta - 1)\)` tails, when updating a beta proir with a binomial likelihood
  + (see .red[*kernels*] on the 2nd line of equations)

---
# Posterior penny &amp;mdash; with numbers

Let's try that again with actual data and a specific prior...

* n = 10 coin flips &amp; x = 3 heads

* flat prior Beta ( `\(\alpha\)` = 1, `\(\beta\)` = 1)

* we want to draw inferences about `\(\theta\)` the probability of the coin
landing on heads (H)


`$$\;\;\propto\;\;
{10 \choose 3} \theta^{3} (1 - \theta)^{10 - 3} \;\;*\;\;
\frac{\gamma(1 + 1)}{\gamma(1)\gamma(1)} \theta^{1 - 1} (1 - \theta)^{1 - 1}$$`


`$$\;\;=\;\;
C_1 \;*\; \theta^{3} (1 - \theta)^{7} \;\;*\;\;
C_2 \;*\; 1 * 1$$`



`$$\;\;=\;\; C_3 \;*\; \theta^{4 - 1} (1 - \theta)^{8 - 1}$$`


So our posterior distribution for `\(\theta\)` is
Beta `\((\alpha^* \,=\, 4, \; \beta^* \,=\, 8)\)` 


---
# Posterior &amp; Prior

``` r
&gt; p &lt;- seq(0, 1, by = 0.001)
&gt; plot(p, dbeta(p, shape1 = 4, shape2 = 8), type = "l", lwd = 3, ylim = c(0, 4), main = expression(paste("posterior: Beta(",
+     alpha, " = 4, ", beta, " = 8), ", " prior: Beta( ", alpha, " = 1, ", beta, " = 1)")),
+     ylab = "density", bty = "n")
&gt; points(p, dbeta(p, shape1 = 1, shape2 = 1), col = "red", type = "l", lwd = 2)
&gt; abline(v = 0.5, lty = 2, col = "red")  ## prior mean
&gt; abline(v = 0.3, lty = 2, col = "seagreen")  ## data mean
&gt; abline(v = 4/(4 + 8), lty = 2)  ## posterior mean
&gt; text(0.65, 2, labels = "prior mean = .5", col = "red")
&gt; text(0.15, 4, labels = "data mean = .3", col = "seagreen")
&gt; text(0.5, 3, labels = "posterior mean = 4/12")
```

# Posterior penny &amp;mdash; conjugate prior

This is a special example where we use a *conjugate* prior

* *conjugacy* the prior is the type of distribution as the posterior
  
* parameters are different, but both are beta (in the coin example)
  
* depends on likelihood distribution: e.g., beta is a conjugate prior for
the binomial likelihood

* in this example, our prior beliefs can be described as having seen
 `\((\alpha - 1)\)` prior heads and `\((\beta - 1)\)` prior tails

  + prior  `\((\alpha^* \,=\, 1, \; \beta^* \,=\, 1)\)` -- suggesting we haven't
  previously seen anything, and simply put equal weight on the chances of H &amp; T
  + likelihood: 10 flips, 3 H, 7 T
  + posterior  `\((\alpha^* \,=\, (3 + 1), \; \beta^* \,=\, (7 + 1))\)` 


---

# Conjugate priors (cont.)

With conjugate priors, deriving the posterior is convenient &amp; relatively easy...
--
and inference is also easy with R functions:


``` r
&gt; alpha = 4
&gt; beta = 8
&gt; qbeta(0.5, alpha, beta)  ## median
## [1] 0.3238045
&gt; qbeta(c(0.25, 0.75), alpha, beta)  ## IQR
## [1] 0.2364026 0.4204710
&gt; alpha/(alpha + beta)  ## mean
## [1] 0.3333333
&gt; pbeta(0.5, alpha, beta)  ## Pr(theta &lt; .50)
## [1] 0.8867188
&gt; p &lt;- seq(0, 1, by = 0.001)
&gt; index_mode &lt;- which.max(dbeta(seq(0, 1, by = 0.001), alpha, beta))
&gt; p[index_mode]  ## mode
## [1] 0.3
&gt; plot(p, dbeta(p, alpha, beta), type = "l", main = expression(paste("posterior: Beta(",
+     alpha, " = 4, ", beta, " = 8)")), ylab = "density", bty = "n")
&gt; abline(v = qbeta(0.5, alpha, beta))
&gt; abline(v = alpha/(alpha + beta), col = "red")
&gt; abline(v = p[index_mode], col = "blue")
```

# Inference through sampling (cont.)

* Can you calculate a 95% *credible interval*?

  + There is a 95% probability that the parameter is within the 95% credible interval

      - Pr(lower bound &lt; `\(\theta\)` &lt; upper bound) = 95%
      - `\(\theta\)` is the probability of H in the previous example

  + note the probabilistic interpretation (and not the awkward word salad of
  describing a confidence interval)

* In many situations (e.g., non-conjugate priors), we do not know the exact
form of the posterior distribution

  + but if we can sample from the posterior, then we can still carry out
  inference


---
# Why Bayes??

* In most well-behaved situations (e.g., regression model, large sample size, reasonable priors)
Bayesian inference is going to be very similar to the frequentist approach

--

* When trouble arises (e.g., small n), Bayesian results can give much more sensible
results

--

* The probabilistic interpretations from the Bayesian approach are extremely appealing

--

* Bayesian approach allows you to carry out inference when frequentist cannot
(e.g., multiple imputation for missing data, model uncertainty, comparing non-nested models)


---
# Why NOT Bayes??

* It is hard! Not all problems are as easy as flipping coins

--

* Sampling methods can help with the hard math.  But now that coding is hard
and it takes a long time!

--

* Well, the coding used to be hard.  Now we have Stan!

--

  + can still take a long time


---
